            pointer-events: none;
        }

        /* 5. Elemen Tipografi */
        .top-brand {
            margin-top: 40px;
            width: 100%;
            text-align: center;
            font-size: 16px;
            font-weight: 700;
            z-index: 3;
            letter-spacing: -0.5px;
        }

        .content {
            position: relative;
            z-index: 3;
            text-align: center;
            max-width: 1200px;
            padding: 0 24px;
            pointer-events: none;
            margin-top: auto;
            margin-bottom: auto;
        }

        h1 {
            font-size: clamp(28px, 5vw, 40px);
            font-weight: 500;
            line-height: 1.3;
            letter-spacing: -1px;
            pointer-events: auto;
        }

        .highlight {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 700;
        }

        .text-blue {
            color: #4F46E5;
        }

        .text-pink {
            color: #E11D48;
        }

        /* Animasi Masuk */
        .animate-in {
            animation: slideUpFade 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 6. CTA / Social Links */
        .social-links {
            display: flex;
            gap: 24px;
            z-index: 3;
            pointer-events: auto;
            white-space: nowrap;
        }

        .social-links a {
            text-decoration: none;
            color: #64748B;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
            letter-spacing: 0.5px;
        }

        .social-links a:hover {
            color: #0F172A;
        }

        .duo-link {
            text-decoration: none;
            color: inherit;
            display: inline-block;
            margin-bottom: 16px;
            pointer-events: auto;
        }

        .duo-widget {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 10px 12px 10px 10px;
            border-radius: 100px;
            border: 1px solid #ffffff;
            box-shadow:
                0 4px 15px rgba(255, 150, 0, 0.05),
                0 1px 2px rgba(255, 150, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .duo-widget:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(255, 150, 0, 0.12);
            border-color: rgba(255, 150, 0, 0.4);
        }

        .duo-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 2px 4px rgba(255, 100, 0, 0.3));
            animation: flame-pulse 2s infinite ease-in-out;
        }

        .duo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        @keyframes flame-pulse {

            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 2px 4px rgba(255, 100, 0, 0.3));
            }

            50% {
                transform: scale(1.15);
                filter: drop-shadow(0 3px 8px rgba(255, 60, 0, 0.5));
            }
        }

        .duo-content {
            display: flex;
            flex-direction: column;
            gap: 2px;
            align-items: flex-start;
        }

        .duo-main {
            font-size: 16px;
            font-weight: 700;
            color: #000000;
            line-height: 1.1;
            letter-spacing: -0.2px;
        }

        .duo-sub {
            font-size: 10px;
            font-weight: 500;
            color: #64748B;
            letter-spacing: 0.08em;
            margin-top: 1px;
        }

        /* Animasi khusus untuk elemen di tengah absolut */
        .animate-in-centered {
            animation: slideUpFadeCentered 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        }

        @keyframes slideUpFadeCentered {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .project-link {
            text-decoration: none;
            color: inherit;
            display: inline-flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
            z-index: 3;
            pointer-events: auto;
        }

        .project-title {
            font-size: 14px;
            font-weight: 500;
            color: #1E293B;
            letter-spacing: -0.01em;
        }

        .project-card {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            background: #FFFFFF;
            padding: 8px 16px 8px 8px;
            border-radius: 24px;
            border: 1px solid #E2E8F0;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            width: 100%;
            max-width: 500px;
        }

        .project-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.1);
            border-color: #CBD5E1;
        }

        .project-thumb {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .project-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
            flex-grow: 1;
            gap: 4px;
        }

        .project-name {
            font-size: 18px;
            font-weight: 700;
            color: #0F172A;
        }

        .project-label {
            font-size: 14px;
            font-weight: 400;
            color: #64748B;
            line-height: 1.5;
            max-width: 280px;
        }

        .project-icon {
            width: 24px;
            height: 24px;
            margin-top: 8px;
            color: #6366F1;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .project-card:hover .project-icon {
            transform: translate(3px, -3px);
            color: #4F46E5;
        }

        .hero-footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            margin-bottom: 40px;
            z-index: 3;
        }

        /* ------------------------------------
           RESPONSIVE MEDIA QUERIES 
           ------------------------------------ */

        /* Tablet & Mobile Landscape */
        @media (max-width: 1024px) {
            h1 {
                font-size: clamp(32px, 6vw, 48px);
            }
        }

        /* Mobile Portrait */
        @media (max-width: 768px) {
            .top-brand {
                margin-top: 24px;
                font-size: 14px;
            }

            .content {
                padding: 0 20px;
            }

            h1 {
                font-size: clamp(26px, 7vw, 36px);
                line-height: 1.35;
            }

            .hero-footer {
                width: 100%;
                padding: 24px;
            }

            .social-links {
                width: 100%;
                /* Memberikan batas layar */
                flex-wrap: wrap;
                /* Izinkan tombol turun ke baris baru jika kepenuhan */
                justify-content: center;
                gap: 16px 20px;
                /* Jarak atas-bawah 16px, kiri-kanan 20px */
            }

            .social-links a {
                font-size: 13px;
                /* Sedikit dikecilkan untuk mencegah wrap yang berlebihan */
            }

            .duo-link {
                margin-bottom: 20px;
            }

            .duo-widget {
                padding: 6px 12px;
            }

            .duo-main {
                font-size: 13px;
            }

            .duo-sub {
                font-size: 8px;
            }

            .project-link {
                width: 100%;
                max-width: none;
            }

            .project-card {
                padding: 12px;
                gap: 12px;
                border-radius: 20px;
            }

            .project-thumb {
                width: 60px;
                height: 60px;
                border-radius: 12px;
            }

            .project-name {
                font-size: 16px;
            }

            .project-label {
                font-size: 12px;
                max-width: 200px;
            }
        }
    </style>
</head>

                <a href="https://www.figma.com/@fvnscreen/" target="_blank">Figma</a>

        </div>

    </section>

    <script>
        // Track mouse untuk desktop
        document.addEventListener('mousemove', (e) => {
            document.documentElement.style.setProperty('--mouse-x', `${e.clientX}px`);
            document.documentElement.style.setProperty('--mouse-y', `${e.clientY}px`);
        });

        // Track touch untuk mobile (opsional agar spotlight mengikuti jari saat disentuh)
        document.addEventListener('touchmove', (e) => {
            document.documentElement.style.setProperty('--mouse-x', `${e.touches[0].clientX}px`);
            document.documentElement.style.setProperty('--mouse-y', `${e.touches[0].clientY}px`);
        });

        // 3. Duolingo Streak Counter (Incremental Daily)
        const updateStreak = () => {
            const startDate = new Date('2026-04-11'); // Start date for 1463 streak
            const baseStreak = 1463;
            const today = new Date();

            // Calculate difference in days
            const diffTime = today.getTime() - startDate.getTime();
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

            // Current streak is base + days since start
            const currentStreak = baseStreak + (diffDays > 0 ? diffDays : 0);

            const streakElement = document.getElementById('duo-streak-count');
            if (streakElement) {
                streakElement.innerText = currentStreak;
            }
        };

        updateStreak();
    </script>
</body>
