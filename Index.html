            background-size: 150px 70px;
            opacity: 0.2;
            filter: contrast(1.2) brightness(0.9);
            -webkit-mask-image: radial-gradient(circle 120px at var(--mouse-x) var(--mouse-y), black 0%, transparent 100%);
            mask-image: radial-gradient(circle 120px at var(--mouse-x) var(--mouse-y), black 0%, transparent 100%);
            pointer-events: none;
        }

        /* 5. Elemen Tipografi */
        .top-brand {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            font-weight: 700;
            z-index: 3;
            letter-spacing: -0.5px;
        }

        .content {
            position: relative;
            z-index: 3;
            text-align: center;
            max-width: 1200px;
            padding: 0 24px;
            pointer-events: none;
        }

        h1 {
            font-size: clamp(28px, 5vw, 40px);
            font-weight: 500;
            line-height: 1.3;
            letter-spacing: -1px;
            pointer-events: auto;
        }

        .highlight {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 700;
        }

        .text-blue { color: #4F46E5; }
        .text-pink { color: #E11D48; }

        /* Animasi Masuk */
        .animate-in {
            animation: slideUpFade 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 6. CTA / Social Links */
        .social-links {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 24px;
            z-index: 3;
            pointer-events: auto;
            white-space: nowrap;
        }

        .social-links a {
            text-decoration: none;
            color: #64748B;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
            letter-spacing: 0.5px;
        }

        .social-links a:hover {
            color: #0F172A;
        }
        
        /* Animasi khusus untuk elemen di tengah absolut */
        .animate-in-centered {
            animation: slideUpFadeCentered 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        }

        @keyframes slideUpFadeCentered {
            from { opacity: 0; transform: translate(-50%, 15px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        /* ------------------------------------
           RESPONSIVE MEDIA QUERIES 
           ------------------------------------ */
        
        /* Tablet & Mobile Landscape */
        @media (max-width: 1024px) {
            h1 {
                font-size: clamp(32px, 6vw, 48px);
            }
        }

        /* Mobile Portrait */
        @media (max-width: 768px) {
            .top-brand {
                top: 24px; /* Naikkan sedikit agar tidak memakan ruang */
                font-size: 14px;
            }

            .content {
                padding: 0 20px;
            }

            h1 {
                font-size: clamp(26px, 7vw, 36px);
                line-height: 1.35;
            }

            .social-links {
                bottom: 32px;
                width: 90%; /* Memberikan batas layar */
                flex-wrap: wrap; /* Izinkan tombol turun ke baris baru jika kepenuhan */
                justify-content: center;
                gap: 16px 20px; /* Jarak atas-bawah 16px, kiri-kanan 20px */
            }

            .social-links a {
                font-size: 13px; /* Sedikit dikecilkan untuk mencegah wrap yang berlebihan */
            }
        }
    </style>

<body>

    <section class="hero" id="hero-section">
        <div class="pattern-bg-base"></div>
        <div class="pattern-bg-highlight"></div>
        
        <div class="top-brand">Affan Maulana</div>
        
        <div class="content animate-in">
            <h1>
                Designing Scalable Environments<br>
                where <span class="highlight text-blue">Urban Design</span> meets<br>
                <span class="highlight text-pink">Digital Systems</span>.
            </h1>
        </div>
        
        <div class="social-links animate-in-centered" style="animation-delay: 0.3s;">
            <a href="mailto:affanmaulanayasin@gmail.com" target="_blank">Email</a>
            <a href="https://linkedin.com/in/affanmaulana" target="_blank">LinkedIn</a>
            <a href="https://issuu.com/affanmy/docs/portolio_affan_maulana_2024/" target="_blank">Issuu</a>
            <a href="https://www.behance.net/affanm#" target="_blank">Behance</a>
            <a href="https://www.figma.com/@fvnscreen/" target="_blank">Figma</a>
        </div>
        
    </section>

    <script>
        // Track mouse untuk desktop
        document.addEventListener('mousemove', (e) => {
            document.documentElement.style.setProperty('--mouse-x', `${e.clientX}px`);
            document.documentElement.style.setProperty('--mouse-y', `${e.clientY}px`);
        });

        // Track touch untuk mobile (opsional agar spotlight mengikuti jari saat disentuh)
        document.addEventListener('touchmove', (e) => {
            document.documentElement.style.setProperty('--mouse-x', `${e.touches[0].clientX}px`);
            document.documentElement.style.setProperty('--mouse-y', `${e.touches[0].clientY}px`);
        });
    </script>
</body>
</html>
